<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f5e5e">
  <title>School Management System</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/report.css">
</head>
<body>
  <div id="root"><div class="loader">Loading…</div></div>
  <div id="toast-host"></div>

  <!-- Config: flip useApi to true to run against the PHP/MySQL REST API -->
  <script>
    window.DB_CONFIG = { useApi: false, apiBase: 'api/index.php' };
  </script>

  <!-- Data + utilities -->
  <script src="js/seed.js"></script>
  <script src="js/store.js"></script>
  <script src="js/util.js"></script>

  <!-- Domain helpers -->
  <script src="js/grading.js"></script>
  <script src="js/finance-lib.js"></script>
  <script src="js/reports-lib.js"></script>
  <script src="js/bulk.js"></script>
  <script src="js/report.js"></script>
  <script src="js/services.js"></script>

  <!-- Shell + router: defines global App before the views capture it -->
  <script src="js/app.js"></script>

  <!-- Views (register into global.Views; rendered on DOMContentLoaded) -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/students.js"></script>
  <script src="js/views/assessment.js"></script>
  <script src="js/views/finance.js"></script>
  <script src="js/views/attendance.js"></script>
  <script src="js/views/communication.js"></script>
  <script src="js/views/inventory.js"></script>
  <script src="js/views/administration.js"></script>
  <script src="js/views/settings.js"></script>
</body>
</html>
